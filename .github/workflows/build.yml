name: Compilazione PlatformIO (Master & Slave)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build ${{ matrix.project }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        project: [master, slave]

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      # Setup Python SENZA cache per evitare l'errore del requirements.txt mancante
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Compila firmware
        run: pio run -d ${{ matrix.project }}
