name: Build Opus and App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make
            autoconf
            automake
            libtool

      - name: Build Opus Library
        shell: msys2 {0}
        run: |
          # You can either git clone or use a folder already in your repo
          git clone https://github.com/xiph/opus.git
          cd opus
          ./autogen.sh
          ./configure --disable-shared --enable-static
          make -j$(nproc)
          
          # Set variables for the next step based on the build location
          echo "OPUS_PATH=$(pwd)" >> $GITHUB_ENV

      - name: Compile Main Application
        shell: msys2 {0}
        run: |
          # Use the OPUS_PATH we saved in the previous step
          gcc -Wall -O2 \
            -I"${{ env.OPUS_PATH }}/include" \
            -L"${{ env.OPUS_PATH }}/.libs" \
            /loracall/loracall.c -o loracall.exe \
            -lopus -lwinmm -lole32 -lm

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: my_app.exe
