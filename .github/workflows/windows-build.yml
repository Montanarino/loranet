name: Build Opus and App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Pull your repository code
      - name: Checkout project code
        uses: actions/checkout@v4

      # 2. Clone the Opus source code (Using standard runner git)
      - name: Clone Opus Source
        run: git clone https://github.com/xiph/opus.git

      # 3. Setup the MSYS2 environment with necessary tools
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make
            autoconf
            automake
            libtool

      # 4. Compile the Opus Library
      - name: Build Opus Library
        shell: msys2 {0}
        run: |
          cd opus
          ./autogen.sh
          ./configure --disable-shared --enable-static
          make -j$(nproc)
          # Save the absolute path for the next step
          echo "OPUS_PATH=$(pwd)" >> $GITHUB_ENV

      # 5. Compile your C file using the library we just built
      - name: Compile Main Application
        shell: msys2 {0}
        run: |
          # Note: Adjust main.c to your actual filename
          # We point -I to the 'include' folder and -L to '.libs' where libopus.a lives
          gcc -Wall -O2 \
            -I"${{ env.OPUS_PATH }}/include" \
            -L"${{ env.OPUS_PATH }}/.libs" \
            /loracall/loracall.c -o loracall.exe \
            -lopus -lwinmm -lole32 -lm

      # 6. Upload the finished .exe so you can download it
      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: my_app.exe
